target = "draft-ietf-plants-merkle-tree-certs.txt#section-7.2"

# Verifying Certificate Signatures
#
#    When verifying the signature of an X.509 certificate (Step (a)(1) of
#    Section 6.1.3 of [RFC5280]) whose issuer is a Merkle Tree CA, the
#    relying party performs the following procedure:
# 
#    1.  Check that the TBSCertificate's signature field is id-alg-
#        mtcProof with omitted parameters.  If this check fails, abort
#        this process and fail verification.
# 
#    2.  Decode the signatureValue as an MTCProof, as described in
#        Section 6.1.
# 
#    3.  Let index be the certificate's serial number.  If index is
#        contained in one of the relying party's revoked ranges
#        (Section 7.5), abort this process and fail verification.
# 
#    4.  Construct a TBSCertificateLogEntry as follows:
# 
#        1.  Copy the version, issuer, validity, subject, issuerUniqueID,
#            subjectUniqueID, and extensions fields from the
#            TBSCertificate.
# 
#        2.  Set subjectPublicKeyAlgorithm to the algorithm field of the
#            subjectPublicKeyInfo.
# 
#        3.  Set subjectPublicKeyInfoHash to the hash of the DER encoding
#            of subjectPublicKeyInfo.
# 
#    5.  Construct a MerkleTreeCertEntry of type tbs_cert_entry with
#        contents the TBSCertificateLogEntry.  Let entry_hash be the hash
#        of the entry, MTH({entry}) = HASH(0x00 || entry), as defined in
#        Section 2.1.1 of [RFC9162].
# 
#    6.  Let expected_subtree_hash be the result of evaluating the
#        MTCProof's inclusion_proof for entry index, with hash entry_hash,
#        of the subtree described by the MTCProof's start and end,
#        following the procedure in Section 4.3.2.  If evaluation fails,
#        abort this process and fail verification.
# 
#    7.  If [start, end) matches a trusted subtree (Section 7.4), check
#        that expected_subtree_hash is equal to the trusted subtree's
#        hash.  Return success if it matches and failure if it does not.
# 
#    8.  Otherwise, check that the MTCProof's signatures contain a
#        sufficient set of valid signatures from cosigners to satisfy the
#        relying party's cosigner requirements (Section 7.3).
#        Unrecognized cosigners MUST be ignored.  Signatures are verified
#        as described in Section 5.4.1.  The hash field of the MTCSubtree
#        is set to expected_subtree_hash.
# 
#    This procedure only replaces the signature verification portion of
#    X.509 path validation.  The relying party MUST continue to perform
#    other checks, such as checking expiry.
# 
#    In this procedure, entry_hash can equivalently be computed in a
#    single pass from the DER-encoded TBSCertificate, without storing the
#    full TBSCertificateLogEntry or MerkleTreeCertEntry in memory:
# 
#    1.  Initialize a hash instance.
# 
#    2.  Write the big-endian, two-byte tbs_cert_entry value to the hash.
# 
#    3.  Write the TBSCertificate contents octets to the hash, up to the
#        subjectPublicKeyInfo field.
# 
#    4.  Write the subjectPublicKeyInfo's algorithm field to the hash.
# 
#    5.  Write the octet 0x04 to the hash.  This is an OCTET STRING
#        identifer.
# 
#    6.  Write the octet L to the hash, where L is the hash length.  (This
#        assumes L is at most 127.)
# 
#    7.  Write H to the hash, where H is the hash of the entire
#        subjectPublicKeyInfo field.
# 
#    8.  Write the remainder of the TBSCertificate contents octets to the
#        hash, starting just after the subjectPublicKeyInfo field.
# 
#    9.  Finalize the hash and set entry_hash to the result.
# 
#    This is possible because the structure in Section 5.3 omits the
#    TBSCertificateLogEntry's identifier and length octets.

[[spec]]
level = "MUST"
quote = '''
Unrecognized cosigners MUST be ignored.
'''

[[spec]]
level = "MUST"
quote = '''
The relying party MUST continue to perform
other checks, such as checking expiry.
'''

